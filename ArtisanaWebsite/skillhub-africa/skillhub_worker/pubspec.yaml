name: skillhub_worker
description: "SkillHub Africa Worker Mobile Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0

  # State Management
  provider: ^6.1.1

  # Networking
  http: ^1.1.0
  dio: ^5.3.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Storage & Persistence
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.2

  # Location & Maps (Enhanced for workers)
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  background_locator: ^1.6.12

  # Image & Media
  image_picker: ^1.0.4
  flutter_image_compress: ^2.1.0
  camera: ^0.10.5+5

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.2
  flutter_local_notifications: ^16.3.2

  # Payment
  flutter_stripe: ^10.1.1

  # Security
  flutter_secure_storage: ^9.0.0

  # Work Management
  flutter_background_service: ^5.0.5
  workmanager: ^0.5.2

  # Document handling
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/documents/
